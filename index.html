<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> crvgames dinozor oyunu</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background-color: #f7f7f7;
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #gameContainer {
            width: 100%;
            height: 100%;
            position: relative;
        }
        canvas {
            background-color: #fff;
            display: block;
            width: 100%;
            height: 100%;
        }
        #controlsInfo {
            text-align: center;
            position: absolute;
            bottom: 20px;
            width: 100%;
            color: #535353;
            font-size: 14px;
            font-weight: bold;
            pointer-events: none; /* Tıklamayı engeller */
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
    <div id="controlsInfo">Zıplamak için Boşluk (SPACE) veya Yukarı Ok tuşuna bas. Eğilmek için Aşağı Ok tuşunu basılı tut.</div>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

 
function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    
     
    groundY = canvas.height * 0.8; 
    dino.y = groundY - dino.height;
}

// Ses Üretici Fonksiyonu 
function playJumpSound() {
    try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();

        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        oscillator.type = 'square'; 
        oscillator.frequency.setValueAtTime(600, audioCtx.currentTime);
        oscillator.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.08);

        gainNode.gain.setValueAtTime(0.12, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);

        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 0.08);
    } catch (e) {
        console.log("Ses çalınamadı:", e);
    }
}

// Oyun Değişkenleri
let score = 0;
let highScore = localStorage.getItem("dinoHighScore") ? parseInt(localStorage.getItem("dinoHighScore")) : 0;
let gameSpeed = 6;
let isGameOver = false;
let gameStarted = false;
let obstacles = [];
let nextObstacleTimer = 0;
let frameCount = 0;
let groundY = 0; // Dinamik hesaplanacak

const keys = { jump: false, duck: false };

function triggerJump() {
    if (isGameOver) {
        resetGame();
    } else if (!gameStarted) {
        gameStarted = true;
    } else if (!dino.isJumping && !dino.isDucking) {
        dino.velocity = dino.jumpForce;
        dino.isJumping = true;
        playJumpSound();
    }
}

window.addEventListener("keydown", (e) => {
    if (e.code === "Space" || e.code === "ArrowUp") {
        e.preventDefault();
        triggerJump();
    }
    if (e.code === "ArrowDown") {
        e.preventDefault();
        keys.duck = true;
        if (gameStarted && !dino.isJumping && !isGameOver) {
            dino.isDucking = true;
        }
    }
});

window.addEventListener("keyup", (e) => {
    if (e.code === "ArrowDown") {
        keys.duck = false;
        dino.isDucking = false;
    }
});

canvas.addEventListener("touchstart", (e) => {
    e.preventDefault();
    triggerJump();
});

// Dinozor Nesnesi
const dino = {
    x: 50,
    y: 0,
    width: 44,
    height: 48,
    duckHeight: 30,
    gravity: 0.6,
    jumpForce: -13, // Büyük ekran için zıplama  
    velocity: 0,
    isJumping: false,
    isDucking: false,
    
    draw() {
        ctx.fillStyle = "#535353";
        if (this.isDucking) {
            let duckY = this.y + (this.height - this.duckHeight);
            ctx.fillRect(this.x, duckY + 5, 55, 20);
            ctx.fillRect(this.x - 10, duckY + 5, 10, 8);
            ctx.fillRect(this.x + 45, duckY, 18, 14);
            ctx.clearRect(this.x + 55, duckY + 3, 3, 3);
            
            if (!isGameOver && frameCount % 6 < 3) {
                ctx.fillRect(this.x + 15, duckY + 25, 6, 5);
            } else {
                ctx.fillRect(this.x + 35, duckY + 25, 6, 5);
            }
        } else {
            ctx.fillRect(this.x + 5, this.y + 12, 30, 24);
            ctx.fillRect(this.x + 22, this.y + 2, 12, 15);
            ctx.fillRect(this.x + 22, this.y, 22, 12);
            ctx.clearRect(this.x + 28, this.y + 3, 3, 3);
            ctx.fillRect(this.x + 34, this.y + 16, 6, 4);
            ctx.fillRect(this.x - 5, this.y + 14, 10, 10);
            ctx.fillRect(this.x - 10, this.y + 16, 5, 5);

            if (this.isJumping) {
                ctx.fillRect(this.x + 10, this.y + 36, 6, 12);
                ctx.fillRect(this.x + 24, this.y + 36, 6, 12);
            } else {
                if (!isGameOver && frameCount % 6 < 3) {
                    ctx.fillRect(this.x + 10, this.y + 36, 6, 12);
                    ctx.fillRect(this.x + 24, this.y + 36, 6, 6);
                } else {
                    ctx.fillRect(this.x + 10, this.y + 36, 6, 6);
                    ctx.fillRect(this.x + 24, this.y + 36, 6, 12);
                }
            }
        }
    },
    
    update() {
        if (gameStarted && !isGameOver) {
            this.velocity += this.gravity;
            this.y += this.velocity;
            if (this.y >= groundY - this.height) {
                this.y = groundY - this.height;
                this.velocity = 0;
                this.isJumping = false;
            }
        }
    }
};

function drawCactus(x, y, width, height) {
    ctx.fillStyle = "#3a7d44";
    ctx.fillRect(x + width/3, y, width/3, height);
    ctx.fillRect(x, y + height/3, width/3, 6);
    ctx.fillRect(x, y + height/6, width/3, height/6);
    ctx.fillRect(x + (width/3)*2, y + height/2, width/3, 6);
    ctx.fillRect(x + width - (width/3), y + height/4, width/3, height/4);
}

function drawBird(x, y, frame) {
    ctx.fillStyle = "#8a3324";
    ctx.fillRect(x + 10, y + 5, 24, 12);
    ctx.fillRect(x + 30, y, 8, 10);
    ctx.fillStyle = "#f1c40f"; 
    ctx.fillRect(x + 38, y + 4, 6, 4);
    ctx.fillStyle = "#8a3324";
    ctx.fillRect(x, y + 8, 10, 6);
    
    if (isGameOver) {
        ctx.fillRect(x + 16, y - 10, 8, 15);
    } else if (frame % 20 < 10) {
        ctx.fillRect(x + 16, y - 10, 8, 15);
    } else {
        ctx.fillRect(x + 16, y + 12, 8, 15);
    }
}

class Obstacle {
    constructor(type) {
        this.type = type;
        this.x = canvas.width;
        if (this.type === "cactus") {
            this.width = 25 + Math.random() * 20;
            this.height = 40 + Math.random() * 20;
            this.y = groundY - this.height;
        } else if (this.type === "bird") {
            this.width = 44;
            this.height = 25;
            // Kuş yüksekliği zemine oranla dinamik ayarlama
            this.y = Math.random() > 0.5 ? groundY - 110 : groundY - 65;
        }
    }
    
    draw() {
        if (this.type === "cactus") {
            drawCactus(this.x, this.y, this.width, this.height);
        } else {
            drawBird(this.x, this.y, frameCount);
        }
    }
    
    update() {
        if (!isGameOver) {
            this.x -= gameSpeed;
        }
    }
}

function spawnObstacle() {
    if (nextObstacleTimer <= 0) {
        let type = Math.random() > 0.35 ? "cactus" : "bird";
        if(score < 0) type = "cactus"; 
        
        obstacles.push(new Obstacle(type));
        nextObstacleTimer = 60 + Math.random() * 80;
    }
    nextObstacleTimer--;
}

 function checkCollision(dinoObj, obsObj) {
    let dinoBox = {
        x: dinoObj.x + 5,
        y: dinoObj.isDucking ? dinoObj.y + (dinoObj.height - dinoObj.duckHeight) : dinoObj.y,
        width: dinoObj.isDucking ? 50 : dinoObj.width - 10,
        height: dinoObj.isDucking ? dinoObj.duckHeight : dinoObj.height
    };
    
    let obsBox = {
        x: obsObj.x,
        y: obsObj.y,
        width: obsObj.width,
        height: obsObj.height
    };
    
     
    if (obsObj.type === "bird") {
        if (dinoObj.isDucking) {
            // Eğer oyuncu eğildiyse, kuşun hitbox'ını küçült ki rahatça geçsin
            obsBox.y = obsObj.y + 2;
            obsBox.height = obsObj.height - 4;
        } else {
            // Eğer oyuncu ayaktaysa, kuşun hitbox'ı hala devasa (affetmez mod)
            obsBox.y = obsObj.y - 12;
            obsBox.height = obsObj.height + 25;
        }
    }
    
    return (
        dinoBox.x < obsBox.x + obsBox.width &&
        dinoBox.x + dinoBox.width > obsBox.x &&
        dinoBox.y < obsBox.y + obsBox.height &&
        dinoBox.y + dinoBox.height > obsBox.y
    );
}

function resetGame() {
    score = 0;
    gameSpeed = 6;
    isGameOver = false;
    gameStarted = true;
    obstacles = [];
    nextObstacleTimer = 0;
    dino.y = groundY - dino.height;
    dino.velocity = 0;
    dino.isJumping = false;
    dino.isDucking = false;
}

// Ekran boyutlandırmasını ilk kez çalıştırma
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function gameLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (gameStarted && !isGameOver) {
        frameCount++;
    }
    
    // Zemin Çizgisi
    ctx.strokeStyle = "#e0e0e0";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, groundY);
    ctx.lineTo(canvas.width, groundY);
    ctx.stroke();
    
    // Arka Plan Çizgileri
    ctx.fillStyle = "#d0d0d0";
    for (let i = 0; i < canvas.width; i += 120) {
        let lineX = (i - (frameCount * (gameSpeed * 0.5) % 120));
        ctx.fillRect(lineX, groundY + 7, 15, 2);
        ctx.fillRect(lineX + 40, groundY + 17, 8, 2);
    }

    dino.update();
    dino.draw();
    
    if (gameStarted && !isGameOver) {
        spawnObstacle();
        if (frameCount % 500 === 0) {
            gameSpeed += 0.5;
        }
        if (frameCount % 5 === 0) {
            score++;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem("dinoHighScore", highScore);
            }
        }
    }
    
    for (let i = obstacles.length - 1; i >= 0; i--) {
        obstacles[i].update();
        obstacles[i].draw();
        if (checkCollision(dino, obstacles[i])) {
            isGameOver = true;
        }
        if (obstacles[i].x + obstacles[i].width < 0) {
            obstacles.splice(i, 1);
        }
    }
    
    // Sağ Üste Sabitlenmiş Skor Tablosu
    ctx.fillStyle = "#535353";
    ctx.font = "bold 18px 'Courier New', Courier, monospace";
    ctx.fillText(`HI: ${String(highScore).padStart(5, '0')}   ${String(score).padStart(5, '0')}`, canvas.width - 200, 40);
    
    if (!gameStarted) {
        ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#535353";
        ctx.font = "bold 24px Arial";
        ctx.textAlign = "center";
        ctx.fillText("BAŞLAMAK İÇİN BOŞLUK TUŞUNA BASIN", canvas.width / 2, canvas.height / 2);
        ctx.textAlign = "start";
    }
    
    if (isGameOver) {
        ctx.fillStyle = "rgba(0, 0, 0, 0.4)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#ffffff";
        ctx.font = "bold 36px Arial";
        ctx.textAlign = "center";
        ctx.fillText("OYUN BİTTİ", canvas.width / 2, canvas.height / 2 - 20);
        ctx.font = "20px Arial";
        ctx.fillText("Yeniden Başlamak İçin BOŞLUK Tuşuna Basın", canvas.width / 2, canvas.height / 2 + 30);
        ctx.textAlign = "start";
    }
    
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
